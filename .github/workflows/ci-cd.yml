name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  IMAGE_NAME: customer-data-fetch
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            **/__pycache__
          key: ${{ runner.os }}-python-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Install dependencies
        run: |
          echo "Upgrading pip..."
          python -m pip install --upgrade pip
          echo "Installing requirements..."
          pip install -r requirements.txt
          echo "Dependencies installed successfully"

      - name: Run static code analysis
        run: |
          echo "Running syntax check..."
          python -m py_compile app.py data_processing.py process_onetouch_to_wedoc.py cookie_sync.py
          echo "Syntax check passed"

      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          if command -v pytest &> /dev/null; then
            pytest --tb=short -q
          else
            echo "pytest not installed, skipping tests"
          fi
        continue-on-error: true

  docker-build:
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image with Buildx
        id: build-image
        run: |
          echo "=== Starting Docker build with Buildx ==="
          echo "Image name: $IMAGE_NAME"
          echo "Image tag: $IMAGE_TAG"
          
          docker buildx build \
            --load \
            --tag $IMAGE_NAME:$IMAGE_TAG \
            --tag $IMAGE_NAME:latest \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache,mode=max \
            .
          
          echo "=== Docker images after build ==="
          docker images
          
          echo "BUILD_SUCCESS=true" >> $GITHUB_OUTPUT

      - name: Verify Docker image
        if: steps.build-image.outputs.BUILD_SUCCESS == 'true'
        continue-on-error: true
        run: |
          echo "=== Verifying Docker image ==="
          if docker images | grep -q $IMAGE_NAME; then
            echo "✓ Image $IMAGE_NAME exists"
          else
            echo "✗ Image $IMAGE_NAME not found"
            exit 1
          fi
          
          echo "=== Testing image run ==="
          container_id=$(docker run -d -p 5000:5000 $IMAGE_NAME:latest)
          sleep 5
          
          if docker ps | grep -q $container_id; then
            echo "✓ Container started successfully"
            docker logs $container_id
            docker stop $container_id
            docker rm $container_id
          else
            echo "✗ Container failed to start (may need environment variables)"
            docker logs $container_id 2>/dev/null || true
            docker rm -f $container_id 2>/dev/null || true
            exit 0
          fi

      - name: Create artifacts directory
        run: |
          echo "=== Creating artifacts directory ==="
          mkdir -p artifacts
          ls -la

      - name: Save Docker image to file
        run: |
          echo "=== Saving Docker image ==="
          echo "Output file: artifacts/$IMAGE_NAME-$IMAGE_TAG.tar.gz"
          
          docker save $IMAGE_NAME:$IMAGE_TAG | gzip -9 > artifacts/$IMAGE_NAME-$IMAGE_TAG.tar.gz
          
          echo "=== Image saved successfully ==="
          ls -lh artifacts/

      - name: Upload Docker image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.sha }}
          path: artifacts/$IMAGE_NAME-$IMAGE_TAG.tar.gz
          retention-days: 7
          compression-level: 0

